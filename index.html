<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bike Obby: Fixed Camera & Solo Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: #0f0; font-family: sans-serif; z-index: 100; pointer-events: none; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 200; }
        .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #0f0; border: none; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 id="msg">MAP 1: FIX LỖI CAMERA 🚲</h2>
    </div>

    <div id="start-screen" class="menu-overlay">
        <button class="btn" onclick="startSolo()">BẮT ĐẦU CHƠI ĐƠN</button>
    </div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: { default: 'arcade', arcade: { gravity: { y: 1200 }, debug: false } },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let player, platforms, winBlock, cursors;
    let isPlaying = false;
    const worldWidth = 3500; // Độ dài Map cực lớn

    function preload() {}

    function create() {
        // Thiết lập giới hạn thế giới
        this.physics.world.setBounds(0, 0, worldWidth, 2000);

        platforms = this.physics.add.staticGroup();

        // --- VẼ ĐỊA HÌNH THEO BẢN VẼ CỦA ÔNG ---
        // Sàn xuất phát (Rất dài và dày để không bị lọt)
        platforms.create(0, 800, null).setDisplaySize(1500, 100).setOrigin(0).refreshBody();

        // 1. Hai cột chắn
        platforms.create(400, 720, null).setDisplaySize(40, 100).refreshBody();
        platforms.create(650, 720, null).setDisplaySize(40, 100).refreshBody();

        // 2. Tấm ván lơ lửng
        platforms.create(900, 650, null).setDisplaySize(250, 30).refreshBody();

        // 3. Cột dọc cản trên cao
        platforms.create(1150, 550, null).setDisplaySize(40, 150).refreshBody();

        // 4. Cột thấp trước dốc
        platforms.create(1400, 750, null).setDisplaySize(40, 60).refreshBody();

        // 5. CÁI DỐC (RAMP)
        let ramp = platforms.create(1800, 680, null).setDisplaySize(600, 30).refreshBody();
        ramp.setAngle(-30);
        ramp.body.updateFromGameObject();

        // 6. Bệ về đích
        platforms.create(2400, 550, null).setDisplaySize(500, 40).refreshBody();

        // Vùng WIN
        winBlock = this.physics.add.staticSprite(2550, 480, null).setDisplaySize(100, 120);
        this.add.text(2530, 440, '🏁', {fontSize: '50px'});

        // --- TẠO PLAYER ---
        player = this.add.container(100, 700); // Tọa độ x=100, y=700 cho an toàn
        let icon = this.add.text(-20, -20, '🚲', { fontSize: '45px' });
        player.setSize(40, 40);
        this.physics.world.enable(player);
        player.add(icon);
        player.body.setCollideWorldBounds(true);
        player.body.setDragX(800);

        // --- FIX CAMERA ---
        this.cameras.main.setBounds(0, 0, worldWidth, 2000);
        this.cameras.main.startFollow(player, true, 0.1, 0.1); // Camera LUÔN bám theo player này

        // Va chạm
        this.physics.add.collider(player, platforms);
        this.physics.add.overlap(player, winBlock, () => {
            document.getElementById('msg').innerText = "THẮNG RỒI! 🎉";
        });

        cursors = this.input.keyboard.createCursorKeys();
    }

    function update() {
        if (!isPlaying) {
            // Khi chưa bấm bắt đầu, giữ player đứng yên
            if(player.body) player.body.allowGravity = false;
            return;
        }
        player.body.allowGravity = true;

        // Điều khiển
        if (cursors.left.isDown) {
            player.body.setVelocityX(-250);
            player.iterate(c => { if(c.type === 'Text') c.setFlipX(true) });
        } else if (cursors.right.isDown) {
            player.body.setVelocityX(250);
            player.iterate(c => { if(c.type === 'Text') c.setFlipX(false) });
        }

        if (cursors.up.isDown && player.body.touching.down) {
            player.body.setVelocityY(-650);
        }

        // Nếu rơi quá sâu (rớt vực) thì hồi sinh
        if (player.y > 1500) {
            player.setPosition(100, 700);
            player.body.setVelocity(0);
        }
    }

    function startSolo() {
        isPlaying = true;
        document.getElementById('start-screen').style.display = 'none';
    }
</script>
</body>
</html>
