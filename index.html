<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bike Parkour: Map 1 Alpha</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui-layer { position: fixed; inset: 0; z-index: 100; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); }
        .menu { background: #222; padding: 25px; border: 2px solid #0f0; border-radius: 15px; text-align: center; color: white; }
        button { padding: 12px 25px; background: #0f0; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; margin-top: 10px; }
        #game-msg { position: fixed; top: 20px; width: 100%; text-align: center; color: #0f0; font-size: 20px; z-index: 50; pointer-events: none; }
    </style>
</head>
<body>

    <div id="game-msg">MAP 1: KHỞI ĐẦU 🚲</div>

    <div id="ui-layer">
        <div class="menu">
            <h2 style="color: #0f0;">CHỌN CHẾ ĐỘ</h2>
            <input type="text" id="room-id" placeholder="Mã phòng..." style="padding:10px; border-radius:5px;"><br><br>
            <button onclick="initGame('single')">CHƠI ĐƠN</button>
            <button onclick="initGame('duo')" style="background: #00e5ff;">CHƠI 2 NGƯỜI (ONLINE)</button>
        </div>
    </div>

<script>
    // --- FIREBASE (Dùng chung bộ nhớ với Note/Game cũ) ---
    const firebaseConfig = {
        apiKey: "AIzaSyARz3WftjUZ_fRoHn4EcL6k9BGlLNiyMA",
        databaseURL: "https://note-15380-default-rtdb.firebaseio.com/", 
        projectId: "note-15380",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myRole = 'p1', roomId, mode = 'single', isRunning = false;

    // --- PHASER ENGINE ---
    const config = {
        type: Phaser.AUTO,
        width: 1000, height: 600,
        physics: { default: 'arcade', arcade: { gravity: { y: 1200 }, debug: false } },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let p1, p2, platforms, winBlock, cursors, keys;
    let respawnPos = { x: 60, y: 500 };

    function preload() {}

    function create() {
        const worldWidth = 2500; // Map dài theo chiều ngang
        this.physics.world.setBounds(0, 0, worldWidth, 800);

        platforms = this.physics.add.staticGroup();

        // --- DỰA THEO BẢN VẼ CỦA ÔNG ---
        // Nền xuất phát
        platforms.create(0, 780, null).setDisplaySize(1200, 40).setOrigin(0).refreshBody();

        // 1. Hai cột chắn đầu tiên
        platforms.create(350, 720, null).setDisplaySize(40, 100).setOrigin(0.5).refreshBody();
        platforms.create(500, 720, null).setDisplaySize(40, 100).setOrigin(0.5).refreshBody();

        // 2. Thanh ngang lơ lửng
        platforms.create(750, 650, null).setDisplaySize(200, 30).setOrigin(0.5).refreshBody();

        // 3. Cột dọc lơ lửng (Cản trên cao)
        platforms.create(1000, 580, null).setDisplaySize(40, 120).setOrigin(0.5).refreshBody();

        // 4. Cột thấp trước khi lên dốc
        platforms.create(1200, 740, null).setDisplaySize(40, 60).setOrigin(0.5).refreshBody();

        // 5. CÁI DỐC (RAMP)
        let ramp = platforms.create(1500, 680, null).setDisplaySize(400, 30).setOrigin(0.5).refreshBody();
        ramp.setAngle(-35); // Nghiêng lên như hình ông vẽ
        ramp.body.updateFromGameObject();

        // 6. Nền về đích (Win Platform)
        platforms.create(1900, 580, null).setDisplaySize(400, 40).setOrigin(0.5).refreshBody();

        // KHỐI WIN (Màu xanh lá)
        winBlock = this.physics.add.staticSprite(2000, 510, null).setDisplaySize(70, 100);
        this.add.text(1980, 480, '🏁', {fontSize: '40px'});

        // TẠO NGƯỜI CHƠI (Dùng Icon)
        p1 = createBike(this, respawnPos.x, respawnPos.y, '🚲', 0x00ff00);
        p2 = createBike(this, respawnPos.x + 40, respawnPos.y, '🚴', 0x00ffff);

        // CAMERA
        this.cameras.main.startFollow(p1, true, 0.1, 0.1);
        this.cameras.main.setBounds(0, 0, worldWidth, 800);

        // VA CHẠM
        this.physics.add.collider([p1, p2], platforms);
        this.physics.add.collider(p1, p2);

        // XỬ LÝ WIN
        this.physics.add.overlap([p1, p2], winBlock, (player) => {
            document.getElementById('game-msg').innerText = "BẠN ĐÃ VỀ ĐÍCH! 🎉";
            document.getElementById('game-msg').style.color = "#ffff00";
        });

        cursors = this.input.keyboard.createCursorKeys();
        keys = this.input.keyboard.addKeys('W,A,S,D');
    }

    function createBike(scene, x, y, icon, color) {
        let container = scene.add.container(x, y);
        let text = scene.add.text(-18, -18, icon, { fontSize: '35px' });
        container.setSize(35, 35);
        scene.physics.world.enable(container);
        container.add(text);
        container.body.setCollideWorldBounds(true);
        container.body.setDragX(600);
        return container;
    }

    function update() {
        if (!isRunning) return;

        let me = (myRole === 'p1') ? p1 : p2;
        let control = (myRole === 'p1') ? cursors : {left: keys.A, right: keys.D, up: keys.W};

        // Lái xe & Bốc đầu nhẹ
        if (control.left.isDown) {
            me.body.setVelocityX(-220);
            me.setAngle(-10);
            me.iterate(t => { if(t.type === 'Text') t.setFlipX(true) });
        } else if (control.right.isDown) {
            me.body.setVelocityX(220);
            me.setAngle(10);
            me.iterate(t => { if(t.type === 'Text') t.setFlipX(false) });
        } else {
            me.setAngle(0);
        }

        if ((control.up.isDown || (control.W && control.W.isDown)) && me.body.touching.down) {
            me.body.setVelocityY(-580);
        }

        // Đồng bộ Online
        if (mode === 'duo' && roomId) {
            db.ref(`bike_online/${roomId}/${myRole}`).set({ x: me.x, y: me.y, angle: me.angle });
            this.cameras.main.startFollow(me, true, 0.1, 0.1); // Camera luôn theo mình
        }

        // Rơi vực = Hồi sinh
        if (me.y > 750) {
            me.x = respawnPos.x; me.y = respawnPos.y;
            me.body.setVelocity(0);
        }
    }

    function initGame(m) {
        mode = m;
        roomId = document.getElementById('room-id').value;
        if(mode === 'duo' && !roomId) return alert("Nhập mã phòng!");

        if(mode === 'duo') {
            const rRef = db.ref(`bike_online/${roomId}`);
            rRef.once('value', s => {
                myRole = (!s.val() || !s.val().p1) ? 'p1' : 'p2';
                rRef.child(myRole === 'p1' ? 'p2' : 'p1').on('value', d => {
                    if(d.val()) {
                        let partner = (myRole === 'p1') ? p2 : p1;
                        partner.x = d.val().x; partner.y = d.val().y; partner.angle = d.val().angle;
                    }
                });
                isRunning = true;
                document.getElementById('ui-layer').style.display = 'none';
            });
        } else {
            p2.setVisible(false); p2.body.enable = false;
            isRunning = true;
            document.getElementById('ui-layer').style.display = 'none';
        }
    }
</script>
</body>
</html>
