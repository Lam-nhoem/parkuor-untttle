<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bike Obby: Fixed Map 1</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #ui-status { position: fixed; top: 10px; width: 100%; text-align: center; color: #0f0; font-family: Arial; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui-status">
        <h2 id="msg">MAP 1: KHÔNG CÒN RƠI TỰ DO 🚲</h2>
        <p>Phím mũi tên để lái - Nếu kẹt bấm F5</p>
    </div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: { default: 'arcade', arcade: { gravity: { y: 1200 }, debug: false } },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let player, platforms, winBlock, cursors;
    // Tọa độ hồi sinh chuẩn: x=100, y=700 (nằm trên sàn)
    let respawnX = 100, respawnY = 700;

    function preload() {}

    function create() {
        const worldWidth = 3000; // Tăng chiều dài để không mất map
        const worldHeight = 1000;
        this.physics.world.setBounds(0, 0, worldWidth, worldHeight);

        platforms = this.physics.add.staticGroup();

        // 1. MẶT ĐẤT XUẤT PHÁT (Kéo dài ra để không bị rớt lúc mới vào)
        platforms.create(0, 750, null).setDisplaySize(1500, 50).setOrigin(0).refreshBody();

        // 2. HAI CỘT CHẮN (Theo hình vẽ)
        platforms.create(400, 680, null).setDisplaySize(40, 100).refreshBody();
        platforms.create(600, 680, null).setDisplaySize(40, 100).refreshBody();

        // 3. TẤM VÁN NGANG
        platforms.create(850, 600, null).setDisplaySize(250, 30).refreshBody();

        // 4. CỘT DỌC TREO (Cản trên cao)
        platforms.create(1100, 500, null).setDisplaySize(40, 150).refreshBody();

        // 5. CỘT THẤP TRƯỚC DỐC
        platforms.create(1350, 710, null).setDisplaySize(40, 80).refreshBody();

        // 6. CÁI DỐC (RAMP) - Đặt xa ra một chút
        let ramp = platforms.create(1700, 650, null).setDisplaySize(500, 30).refreshBody();
        ramp.setAngle(-30);
        ramp.body.updateFromGameObject();

        // 7. BỆ VỀ ĐÍCH
        platforms.create(2200, 520, null).setDisplaySize(400, 40).refreshBody();

        // KHỐI WIN (Xanh lá)
        winBlock = this.physics.add.staticSprite(2350, 450, null).setDisplaySize(80, 120);
        this.add.text(2330, 410, '🏁', {fontSize: '50px'});

        // --- TẠO XE ĐẠP ---
        player = this.add.container(respawnX, respawnY);
        let bikeIcon = this.add.text(-20, -20, '🚲', { fontSize: '45px' });
        player.setSize(40, 40);
        this.physics.world.enable(player);
        player.add(bikeIcon);
        
        player.body.setCollideWorldBounds(true);
        player.body.setDragX(800); // Dễ dừng xe hơn
        player.body.setBounce(0.1); // Không bị nảy quá đà

        // CAMERA THEO XE (Rất quan trọng để không mất map)
        this.cameras.main.startFollow(player, true, 0.1, 0.1);
        this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);

        // VA CHẠM
        this.physics.add.collider(player, platforms);
        
        // CHECK WIN
        this.physics.add.overlap(player, winBlock, () => {
            document.getElementById('msg').innerText = "CHIẾN THẮNG RỒI ÔNG CHÁU ƠI! 🎉";
            document.getElementById('msg').style.color = "#ffff00";
        });

        cursors = this.input.keyboard.createCursorKeys();
    }

    function update() {
        // Di chuyển
        if (cursors.left.isDown) {
            player.body.setVelocityX(-250);
            player.iterate(c => { if(c.type === 'Text') c.setFlipX(true) });
        } else if (cursors.right.isDown) {
            player.body.setVelocityX(250);
            player.iterate(c => { if(c.type === 'Text') c.setFlipX(false) });
        }

        // Nhảy
        if (cursors.up.isDown && player.body.touching.down) {
            player.body.setVelocityY(-650);
        }

        // Fix lỗi rơi khỏi map: Nếu y quá lớn thì hồi sinh
        if (player.y > 900) {
            player.setPosition(respawnX, respawnY);
            player.body.setVelocity(0);
        }
    }
</script>
</body>
</html>
